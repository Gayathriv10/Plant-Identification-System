{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="hero-section-bs d-flex align-items-center justify-content-center text-center text-white">
    <div class="hero-overlay"></div>
    <div class="container position-relative z-1 animate-fade-in">
        <h1 class="display-1 fw-bold mb-4 text-white" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Welcome
            to<br>The Green
            Healers</h1>
        <p class="lead fs-2 mb-5 text-light" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Know Your Plant, Nurture
            Your Health</p>

        <div class="mt-5 d-flex gap-3 justify-content-center">
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="btn btn-success btn-lg rounded-pill px-5 shadow-lg">Go to
                Dashboard</a>
            {% else %}
            <a href="{% url 'register' %}" class="btn btn-success btn-lg rounded-pill px-5 shadow-lg">Get Started</a>
            <a href="{% url 'login' %}"
                class="btn btn-outline-light btn-lg rounded-pill px-5 shadow-lg backdrop-blur">Login</a>
            {% endif %}
        </div>

        <div class="mt-5 pt-5">
            <a href="{% url 'growth_tips' %}" class="text-white-50 text-decoration-underline small">Soil & Climate
                Recommendations</a>
        </div>
    </div>
</div>

<style>
    .backdrop-blur {
        backdrop-filter: blur(5px);
    }
</style>
{% endblock %}
